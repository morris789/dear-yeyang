<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亲爱的叶杨</title>
<style>
  :root {
    --bg: #f7f3ee;
    --card: #fffdfa;
    --ink: #4a3f3c;
    --ink-soft: #8c7f7a;
    --rose: #b76e79;
    --rose-light: #e8d5d5;
    --sage: #9aa08e;
    --line: #e5ddd3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* 自定义照片背景 */
  #bgLayer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  #bgLayer.on { opacity: 1; }
  #bgVeil {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(rgba(247,243,238,.82), rgba(247,243,238,.88));
    display: none;
  }
  body.has-bg #bgVeil { display: block; }
  header, .container, footer, .env-warn { position: relative; z-index: 1; }

  /* 顶部 */
  /* 环境提示条 */
  .env-warn {
    display: none;
    background: #fdf3e7;
    border-bottom: 1px solid #ecd9bd;
    color: #8a6a3b;
    font-size: 13px;
    letter-spacing: 1px;
    text-align: center;
    padding: 12px 20px;
    line-height: 1.7;
  }
  .env-warn.show { display: block; }

  header {
    text-align: center;
    padding: 90px 24px 40px;
    position: relative;
  }
  .ornament {
    width: 120px;
    margin: 0 auto 26px;
    display: block;
    opacity: .85;
  }
  header h1 {
    font-size: clamp(34px, 6vw, 52px);
    font-weight: 500;
    letter-spacing: 14px;
    text-indent: 14px;
    color: var(--ink);
  }
  header .sub {
    margin-top: 18px;
    font-size: 14px;
    letter-spacing: 5px;
    color: var(--ink-soft);
  }
  .divider {
    width: 56px;
    height: 1px;
    background: var(--rose);
    margin: 26px auto 0;
    position: relative;
  }
  .divider::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    background: var(--rose);
    border-radius: 50%;
    top: -2px; left: 50%;
    transform: translateX(-50%);
  }
  .bg-controls { margin-top: 20px; }
  .bg-controls button {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    transition: color .2s;
  }
  .bg-controls button:hover { color: var(--rose); }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 30px 24px 60px;
  }

  /* 植物插画横排 */
  .botanical {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 40px;
    padding: 10px 0 50px;
  }
  .botanical svg {
    height: 110px;
    width: auto;
    opacity: .75;
  }
  @media (max-width: 560px) {
    .botanical { gap: 22px; }
    .botanical svg { height: 84px; }
    .botanical svg:nth-child(4), .botanical svg:nth-child(5) { display: none; }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 44px 40px;
    margin-bottom: 36px;
    box-shadow: 0 2px 20px rgba(74, 63, 60, .05);
  }
  @media (max-width: 560px) { .card { padding: 32px 22px; } }

  .card h2 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 6px;
    margin-bottom: 6px;
  }
  .card .en {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--rose);
    text-transform: uppercase;
    font-family: Georgia, serif;
    margin-bottom: 28px;
  }
  .today {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 2px;
    margin-bottom: 24px;
  }

  /* 心情选择 */
  .moods {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 26px;
  }
  .mood-btn {
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 22px;
    cursor: pointer;
    transition: all .25s;
  }
  .mood-btn:hover { border-color: var(--rose); color: var(--rose); }
  .mood-btn.active {
    background: var(--rose);
    border-color: var(--rose);
    color: #fff;
  }

  textarea {
    width: 100%;
    min-height: 110px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: transparent;
    padding: 16px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.8;
    resize: vertical;
    outline: none;
    transition: border-color .25s;
  }
  textarea::placeholder { color: #bfb3ab; }
  textarea:focus { border-color: var(--rose); }

  .save-btn {
    margin-top: 22px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 6px;
    text-indent: 6px;
    color: #fff;
    background: var(--ink);
    border: none;
    padding: 13px 46px;
    cursor: pointer;
    transition: background .25s;
  }
  .save-btn:hover { background: var(--rose); }

  /* Emoji 表情 */
  .emoji-toggle {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin: 22px 0 10px;
    display: block;
    transition: color .2s;
  }
  .emoji-toggle:hover { color: var(--rose); }
  .emoji-toggle .arrow {
    display: inline-block;
    transition: transform .25s;
    font-size: 10px;
  }
  .emoji-toggle.open .arrow { transform: rotate(180deg); }
  .emoji-bar {
    display: none;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 20px;
    max-height: 112px;
    overflow-y: auto;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: rgba(255,255,255,.5);
  }
  .emoji-btn {
    font-size: 21px;
    background: none;
    border: none;
    border-radius: 8px;
    padding: 4px 6px;
    cursor: pointer;
    transition: all .15s;
    line-height: 1;
  }
  .emoji-btn:hover { background: var(--rose-light); transform: scale(1.2); }
  .emoji-bar.open { display: flex; }

  /* 照片 / 视频上传 */
  .upload-row { margin-top: 20px; }
  .upload-btn {
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    background: none;
    border: 1px dashed var(--rose);
    border-radius: 4px;
    padding: 10px 26px;
    cursor: pointer;
    transition: all .25s;
  }
  .upload-btn:hover { color: var(--rose); background: rgba(183, 110, 121, .06); }
  .previews {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }
  .thumb {
    position: relative;
    width: 92px;
    height: 92px;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .thumb img, .thumb video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb .rm {
    position: absolute;
    top: 4px; right: 4px;
    width: 20px; height: 20px;
    line-height: 18px;
    text-align: center;
    background: rgba(74, 63, 60, .65);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 12px;
    cursor: pointer;
  }
  .thumb .rm:hover { background: var(--rose); }
  .thumb-wrap { width: 92px; }
  .thumb-wrap.wide { width: 220px; }
  .thumb-file {
    font-size: 10px;
    letter-spacing: .5px;
    color: var(--ink-soft);
    margin-top: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .thumb.video-box {
    width: 220px;
    height: 150px;
    background: #1c1614;
  }
  .thumb.video-box video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .thumb-name {
    width: 100%;
    margin-top: 6px;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 5px 7px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink);
    background: transparent;
    outline: none;
    transition: border-color .2s;
  }
  .thumb-name::placeholder { color: #c9bcb4; }
  .thumb-name:focus { border-color: var(--rose); }
  .media-name {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink-soft);
    text-align: center;
    padding: 7px 8px;
    max-width: 164px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    border-top: 1px solid var(--line);
    background: rgba(255, 253, 250, .92);
  }

  /* 日记内的媒体 */
  .entry-media {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 14px;
  }
  .media-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
    background: #f0eae3;
  }
  .media-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(74, 63, 60, .18);
  }
  .media-item img {
    width: 164px;
    height: 164px;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
    transition: transform .6s cubic-bezier(.2,.8,.2,1);
  }
  .media-item:hover img { transform: scale(1.07); }
  .media-item video {
    max-width: 260px;
    max-height: 200px;
    display: block;
  }
  .media-dl {
    position: absolute;
    top: 8px; right: 8px;
    width: 30px; height: 30px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 253, 250, .88);
    color: var(--ink);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transform: translateY(-4px);
    transition: all .25s;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .media-item:hover .media-dl { opacity: 1; transform: none; }
  .media-dl:hover { background: var(--rose); color: #fff; }

  /* 高级图片预览 */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(28, 22, 20, .8);
    backdrop-filter: blur(16px) saturate(.8);
    -webkit-backdrop-filter: blur(16px) saturate(.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s ease;
  }
  .lightbox.show { opacity: 1; pointer-events: auto; }
  .lightbox img {
    max-width: 88vw;
    max-height: 84vh;
    border-radius: 6px;
    box-shadow: 0 40px 90px rgba(0, 0, 0, .55);
    transform: scale(.94);
    transition: transform .4s cubic-bezier(.2,.8,.2,1);
  }
  .lightbox.show img { transform: scale(1); }
  .lightbox video {
    max-width: 88vw;
    max-height: 84vh;
    border-radius: 6px;
    box-shadow: 0 40px 90px rgba(0, 0, 0, .55);
    transform: scale(.94);
    transition: transform .4s cubic-bezier(.2,.8,.2,1);
    display: none;
  }
  .lightbox.show video { transform: scale(1); }
  .thumb .play {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(30, 24, 22, .28);
    color: #fff;
    font-size: 24px;
    pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .thumb.clickable { cursor: zoom-in; }
  .lb-btn {
    position: absolute;
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, .1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, .22);
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background .25s, transform .25s;
    user-select: none;
  }
  .lb-btn:hover { background: rgba(255, 255, 255, .26); transform: scale(1.08); }
  .lb-close { top: 26px; right: 26px; }
  .lb-dl { top: 26px; right: 84px; font-size: 16px; }
  .lb-prev { left: 26px; top: 50%; margin-top: -22px; }
  .lb-next { right: 26px; top: 50%; margin-top: -22px; }
  .lb-count {
    position: absolute;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, .75);
    font-size: 12px;
    letter-spacing: 4px;
  }
  @media (max-width: 560px) {
    .media-item img { width: 128px; height: 128px; }
    .lb-prev { left: 10px; }
    .lb-next { right: 10px; }
  }

  /* 日记 */
  .entry {
    padding: 26px 4px;
    border-bottom: 1px solid var(--line);
  }
  .entry:last-child { border-bottom: none; }
  .entry-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .entry-date {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
  }
  .entry-mood {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--rose);
    border: 1px solid var(--rose-light);
    border-radius: 999px;
    padding: 2px 14px;
    margin-right: 10px;
  }
  .entry-text {
    font-size: 15px;
    line-height: 2;
    white-space: pre-wrap;
  }
  .del-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    color: #c9bcb4;
    cursor: pointer;
  }
  .del-btn:hover { color: var(--rose); }

  /* 工具栏：筛选 + 导出 */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .toolbar select {
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 7px 12px;
    outline: none;
    cursor: pointer;
  }
  .toolbar select:focus { border-color: var(--rose); }
  .tool-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .tool-btn {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 18px;
    cursor: pointer;
    transition: all .25s;
  }
  .tool-btn:hover { border-color: var(--rose); color: var(--rose); }
  .count {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .empty {
    text-align: center;
    color: #bfb3ab;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 30px 0;
  }

  footer {
    text-align: center;
    padding: 20px 24px 60px;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<div class="env-warn" id="envWarn">
  ⚠️ 当前在 Claude 应用的预览窗口中打开，<b>视频将无法播放</b>。<br>
  请在访达（Finder）中找到本文件，右键 → 打开方式 → <b>Chrome 或 Safari</b>，即可使用全部功能。
</div>

<header>
  <!-- 顶部线描花枝 -->
  <svg class="ornament" viewBox="0 0 120 40" fill="none" stroke="#b76e79" stroke-width="1.2" stroke-linecap="round">
    <path d="M10 30 Q40 26 60 20 Q80 26 110 30"/>
    <path d="M60 20 Q58 12 60 6"/>
    <ellipse cx="60" cy="6" rx="4" ry="5.5"/>
    <path d="M38 24 Q34 18 36 13 M36 13 Q40 17 38 24" />
    <path d="M82 24 Q86 18 84 13 M84 13 Q80 17 82 24" />
    <circle cx="22" cy="28" r="1.4" fill="#b76e79"/>
    <circle cx="98" cy="28" r="1.4" fill="#b76e79"/>
  </svg>
  <h1>亲爱的叶杨</h1>
  <div class="sub">DEAR YE YANG · 一日一记</div>
  <div class="divider"></div>
  <div class="bg-controls">
    <button id="setBg">设置背景照片</button>
    <button id="clearBg" style="display:none">清除背景</button>
    <input type="file" id="bgFile" accept="image/*" multiple style="display:none">
  </div>
</header>

<div class="container">

  <!-- 线描植物 -->
  <div class="botanical">
    <!-- 玫瑰 -->
    <svg viewBox="0 0 60 110" fill="none" stroke="#b76e79" stroke-width="1.3" stroke-linecap="round">
      <path d="M30 105 L30 42"/>
      <path d="M30 78 Q18 72 14 60"/>
      <path d="M30 66 Q42 60 46 48"/>
      <path d="M30 42 C18 42 16 28 24 22 C20 12 34 6 38 14 C48 12 50 26 42 30 C46 40 36 46 30 42 Z"/>
      <path d="M30 38 C26 34 28 26 34 24" stroke-width="1"/>
    </svg>
    <!-- 桔梗 -->
    <svg viewBox="0 0 60 110" fill="none" stroke="#9aa08e" stroke-width="1.3" stroke-linecap="round">
      <path d="M30 105 Q28 70 30 40"/>
      <path d="M30 70 Q20 64 18 54"/>
      <path d="M30 55 Q40 50 42 40"/>
      <path d="M30 40 L22 26 L30 10 L38 26 Z"/>
      <path d="M30 40 L30 24" stroke-width="1"/>
    </svg>
    <!-- 山茶 -->
    <svg viewBox="0 0 60 110" fill="none" stroke="#b76e79" stroke-width="1.3" stroke-linecap="round">
      <path d="M30 105 L30 48"/>
      <path d="M30 86 Q40 80 44 70"/>
      <circle cx="30" cy="32" r="16"/>
      <circle cx="30" cy="32" r="9"/>
      <circle cx="30" cy="32" r="3"/>
      <path d="M30 16 L30 12 M46 32 L50 32 M30 48 L30 52 M14 32 L10 32" stroke-width="1"/>
    </svg>
    <!-- 尤加利 -->
    <svg viewBox="0 0 60 110" fill="none" stroke="#9aa08e" stroke-width="1.3" stroke-linecap="round">
      <path d="M30 105 Q32 60 28 12"/>
      <ellipse cx="20" cy="30" rx="6" ry="4" transform="rotate(-30 20 30)"/>
      <ellipse cx="38" cy="42" rx="6" ry="4" transform="rotate(30 38 42)"/>
      <ellipse cx="21" cy="56" rx="6" ry="4" transform="rotate(-30 21 56)"/>
      <ellipse cx="38" cy="70" rx="6" ry="4" transform="rotate(30 38 70)"/>
      <ellipse cx="23" cy="84" rx="6" ry="4" transform="rotate(-30 23 84)"/>
    </svg>
    <!-- 铃兰 -->
    <svg viewBox="0 0 60 110" fill="none" stroke="#b76e79" stroke-width="1.3" stroke-linecap="round">
      <path d="M30 105 Q26 60 30 15"/>
      <path d="M29 30 Q20 34 18 42 Q22 44 26 42"/>
      <path d="M29 48 Q38 52 40 60 Q36 62 32 60"/>
      <path d="M29 66 Q20 70 18 78 Q22 80 26 78"/>
      <path d="M30 15 Q34 10 40 10" stroke-width="1"/>
    </svg>
  </div>

  <!-- 今日心情 -->
  <div class="card">
    <h2>今日心情</h2>
    <div class="en">Mood of the Day</div>
    <div class="today" id="today"></div>
    <div class="moods" id="moods">
      <button class="mood-btn" data-mood="平静">平静</button>
      <button class="mood-btn" data-mood="喜悦">喜悦</button>
      <button class="mood-btn" data-mood="期待">期待</button>
      <button class="mood-btn" data-mood="思念">思念</button>
      <button class="mood-btn" data-mood="疲惫">疲惫</button>
      <button class="mood-btn" data-mood="低落">低落</button>
      <button class="mood-btn" data-mood="释然">释然</button>
    </div>
    <button class="emoji-toggle" id="emojiToggle">表情符号 <span class="arrow">▼</span></button>
    <div class="emoji-bar" id="emojiBar"></div>
    <textarea id="note" placeholder="此刻的心情，值得被认真记下。"></textarea>
    <div class="upload-row">
      <button class="upload-btn" id="addMedia">＋ 添加照片 / 视频</button>
      <input type="file" id="mediaFile" accept="image/*,video/*" multiple style="display:none">
      <div class="previews" id="previews"></div>
    </div>
    <button class="save-btn" id="save">上 传</button>
  </div>

  <!-- 心情手记 -->
  <div class="card">
    <h2>心情手记</h2>
    <div class="en">Journal</div>
    <div class="toolbar">
      <select id="monthFilter">
        <option value="">全部记录</option>
      </select>
      <div class="tool-group">

<script>
  // 环境检测：Claude 应用预览窗口无法播放视频
  if (location.protocol !== 'file:' && location.protocol !== 'http:' && location.protocol !== 'https:') {
    document.getElementById('envWarn').classList.add('show');
  }

  // 今日日期
  const now = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  document.getElementById('today').textContent =
    `${now.getFullYear()} 年 ${now.getMonth()+1} 月 ${now.getDate()} 日 · 星期${weekdays[now.getDay()]}`;

  // 心情选择
  let selectedMood = '';
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMood = btn.dataset.mood;
    };
  });

  const KEY = 'yeyang-moods';
  const load = () => JSON.parse(localStorage.getItem(KEY) || '[]');
  const store = d => localStorage.setItem(KEY, JSON.stringify(d));

  // ===== Emoji 表情 =====
  const EMOJIS = ['😊','😄','🥰','😘','😍','🤗','😌','🙂','😉','🤭','😜','🙃','😶','🤔','😮','🥹','😢','😭','😤','😠','😴','🥱','😷','🤒','💪','🙏','👏','🫶','❤️','💕','💖','💫','🌹','🌸','🌷','💐','🌻','🍀','🌙','⭐','✨','🔥','🌈','☀️','🌧️','❄️','☕','🍰','🍜','🍷','🎵','🎬','📖','🏃','🧘','✈️','🏠','🐱','🐶','🎁'];
  const emojiBar = document.getElementById('emojiBar');
  const noteEl = document.getElementById('note');
  const emojiToggle = document.getElementById('emojiToggle');
  emojiToggle.onclick = () => {
    emojiBar.classList.toggle('open');
    emojiToggle.classList.toggle('open');
  };
  EMOJIS.forEach(ch => {
    const b = document.createElement('button');
    b.className = 'emoji-btn';
    b.textContent = ch;
    b.onclick = () => {
      const s = noteEl.selectionStart, e = noteEl.selectionEnd;
      noteEl.value = noteEl.value.slice(0, s) + ch + noteEl.value.slice(e);
      noteEl.focus();
      noteEl.selectionStart = noteEl.selectionEnd = s + ch.length;
    };
    emojiBar.appendChild(b);
  });

  // ===== 照片 / 视频（IndexedDB 存储）=====
  const dbp = new Promise((res, rej) => {
    const req = indexedDB.open('yeyang-media', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('media', { keyPath: 'id' });
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
  const idb = (mode, fn) => dbp.then(db => new Promise((res, rej) => {
    const tx = db.transaction('media', mode);
    const out = fn(tx.objectStore('media'));
    tx.oncomplete = () => res(out && out.result);
    tx.onerror = () => rej(tx.error);
  }));
  const mediaPut = item => idb('readwrite', s => s.put(item));
  const mediaGet = id => idb('readonly', s => s.get(id));
  const mediaDel = id => idb('readwrite', s => s.delete(id));

  let pending = []; // 待保存的媒体 {id, file, kind}
  document.getElementById('addMedia').onclick = () => document.getElementById('mediaFile').click();
  // 判断文件类型（MIME 为空时按扩展名判断）
  const VIDEO_EXT = /\.(mp4|mov|m4v|webm|ogv|avi|mkv|3gp)$/i;
  const isVideoFile = f => f.type.startsWith('video') || (!f.type && VIDEO_EXT.test(f.name)) || VIDEO_EXT.test(f.name);
  // 确保 Blob 带正确的 MIME 类型（否则浏览器可能拒绝播放）
  function typedBlob(blob, kind, name) {
    if (blob.type && blob.type !== 'application/octet-stream') return blob;
    let t = kind === 'video' ? 'video/mp4' : 'image/jpeg';
    if (name) {
      const ext = (name.split('.').pop() || '').toLowerCase();
      const map = { mp4:'video/mp4', m4v:'video/mp4', mov:'video/quicktime', webm:'video/webm', ogv:'video/ogg',
                    jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', gif:'image/gif', webp:'image/webp', heic:'image/heic' };
      if (map[ext]) t = map[ext];
    }
    return new Blob([blob], { type: t });
  }

  document.getElementById('mediaFile').onchange = e => {
    [...e.target.files].forEach(f => {
      const kind = isVideoFile(f) ? 'video' : 'image';
      pending.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 8), file: f, kind });
    });
    e.target.value = '';
    renderPreviews();
  };

  function updateSaveLabel() {
    document.getElementById('save').textContent = '上 传';
  }

  function renderPreviews() {
    const box = document.getElementById('previews');
    box.innerHTML = '';
    const galP = []; // 预览画廊（点击可放大 / 播放）
    pending.forEach((p, i) => {
      const url = URL.createObjectURL(typedBlob(p.file, p.kind, p.file.name));
      const gi = galP.length;
      galP.push({ url, kind: p.kind, name: (p.name || '').trim() || p.file.name });
      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      const d = document.createElement('div');
      if (p.kind === 'video') {
        // 视频：直接内嵌原生播放器，点击即可播放
        wrap.classList.add('wide');
        d.className = 'thumb video-box';
        const v = document.createElement('video');
        v.src = url;
        v.controls = true;
        v.playsInline = true;
        v.preload = 'metadata';
        v.onerror = () => {
          d.innerHTML = '<div style="color:#fff;font-size:12px;padding:10px;text-align:center;line-height:1.6">⚠ 视频无法解码<br>请检查编码格式</div>';
        };
        d.appendChild(v);
      } else {
        d.className = 'thumb clickable';
        d.innerHTML = `<img src="${url}">`;
        d.onclick = () => openLb(galP, gi);
      }
      const rm = document.createElement('button');
      rm.className = 'rm';
      rm.textContent = '×';
      rm.onclick = ev => { ev.stopPropagation(); pending.splice(i, 1); renderPreviews(); };
      d.appendChild(rm);
      const fn = document.createElement('div');
      fn.className = 'thumb-file';
      fn.textContent = p.file.name;
      fn.title = p.file.name;
      const inp = document.createElement('input');
      inp.className = 'thumb-name';
      inp.placeholder = '命名（可选）';
      inp.maxLength = 30;
      inp.value = p.name || '';
      inp.oninput = () => { p.name = inp.value; };
      wrap.append(d, fn, inp);
      box.appendChild(wrap);
    });
    updateSaveLabel();
  }

  // ===== 自定义照片背景 =====
  const BGKEY = 'yeyang-bg';
  const bgLayer = document.createElement('div'); bgLayer.id = 'bgLayer';
  const bgVeil = document.createElement('div'); bgVeil.id = 'bgVeil';
  document.body.prepend(bgVeil);
  document.body.prepend(bgLayer);
  let bgTimer = null;

  async function applyBg() {
    const ids = JSON.parse(localStorage.getItem(BGKEY) || '[]');
    clearInterval(bgTimer);
    // 用户自设背景优先；否则使用内置背景照片
    let urls = [];
    for (const id of ids) {
      const rec = await mediaGet(id);
      if (rec) urls.push(URL.createObjectURL(rec.blob));
    }
    const usingCustom = urls.length > 0;
    if (!usingCustom) urls = (window.BUILTIN_BG || []).slice();
    document.getElementById('clearBg').style.display = usingCustom ? 'inline' : 'none';
    if (!urls.length) {
      bgLayer.classList.remove('on');
      document.body.classList.remove('has-bg');
      return;
    }
    let bi = 0;
    const show = () => { bgLayer.style.backgroundImage = `url("${urls[bi]}")`; bi = (bi + 1) % urls.length; };
    show();
    bgLayer.classList.add('on');
    document.body.classList.add('has-bg');
    if (urls.length > 1) {
      bgTimer = setInterval(() => {
        bgLayer.classList.remove('on');
        setTimeout(() => { show(); bgLayer.classList.add('on'); }, 1400);
      }, 18000); // 每 18 秒轮换
    }
  }

  document.getElementById('setBg').onclick = () => document.getElementById('bgFile').click();
  document.getElementById('bgFile').onchange = async e => {
    const files = [...e.target.files].filter(f => !isVideoFile(f));
    e.target.value = '';
    if (!files.length) { alert('请选择照片（不支持视频作背景）。'); return; }
    try {
      // 清掉旧背景
      const old = JSON.parse(localStorage.getItem(BGKEY) || '[]');
      for (const id of old) await mediaDel(id);
      const ids = [];
      for (const f of files) {
        const id = 'bg-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
        await mediaPut({ id, kind: 'image', blob: typedBlob(f, 'image', f.name) });
        ids.push(id);
      }
      localStorage.setItem(BGKEY, JSON.stringify(ids));
      applyBg();
    } catch (err) {
      alert('背景保存失败：' + (err && err.message || err));
    }
  };
  document.getElementById('clearBg').onclick = async () => {
    const ids = JSON.parse(localStorage.getItem(BGKEY) || '[]');
    for (const id of ids) await mediaDel(id);
    localStorage.removeItem(BGKEY);
    applyBg();
  };
  applyBg();

  // ===== 高级图片预览（灯箱）=====
  const lightbox = document.createElement('div');
  lightbox.className = 'lightbox';
  lightbox.innerHTML = `
    <img>
    <video controls playsinline preload="auto"></video>
    <button class="lb-btn lb-close" title="关闭">✕</button>
    <button class="lb-btn lb-dl" title="下载">⤓</button>
    <button class="lb-btn lb-prev" title="上一张">‹</button>
    <button class="lb-btn lb-next" title="下一张">›</button>
    <div class="lb-count"></div>`;
  document.body.appendChild(lightbox);
  const lbImg = lightbox.querySelector('img');
  const lbVid = lightbox.querySelector('video');
  let lbGal = [], lbIdx = 0;

  function lbShow() {
    const it = lbGal[lbIdx];
    lbVid.pause();
    if (it.kind === 'video') {
      lbImg.style.display = 'none';
      lbVid.style.display = 'block';
      if (lbVid.src !== it.url) {
        lbVid.src = it.url;
        lbVid.load();
      }
      lbVid.play().catch(() => {}); // 自动开始播放
    } else {
      lbVid.style.display = 'none';
      lbVid.removeAttribute('src');
      lbImg.src = it.url;
      lbImg.style.display = 'block';
    }
    lightbox.querySelector('.lb-count').textContent = lbGal.length > 1 ? `${lbIdx + 1} ／ ${lbGal.length}` : '';
    const nav = lbGal.length > 1 ? 'flex' : 'none';
    lightbox.querySelector('.lb-prev').style.display = nav;
    lightbox.querySelector('.lb-next').style.display = nav;
  }
  function openLb(gal, idx) {
    lbGal = gal; lbIdx = idx;
    lbShow();
    lightbox.classList.add('show');
  }
  function closeLb() {
    lbVid.pause();
    lightbox.classList.remove('show');
  }
  // 视频格式不支持时提示（如 iPhone 的 HEVC 编码 .mov）
  lbVid.onerror = () => {
    if (lightbox.classList.contains('show') && lbVid.style.display === 'block') {
      alert('该视频格式浏览器暂不支持播放（常见于 iPhone 的 .mov 视频）。可点击下载按钮保存后用本地播放器观看。');
    }
  };
  const lbStep = d => { lbIdx = (lbIdx + d + lbGal.length) % lbGal.length; lbShow(); };
  lightbox.querySelector('.lb-close').onclick = closeLb;
  lightbox.querySelector('.lb-prev').onclick = e => { e.stopPropagation(); lbStep(-1); };
  lightbox.querySelector('.lb-next').onclick = e => { e.stopPropagation(); lbStep(1); };
  lightbox.querySelector('.lb-dl').onclick = e => { e.stopPropagation(); dlUrl(lbGal[lbIdx].url, lbGal[lbIdx].name); };
  lightbox.onclick = e => { if (e.target === lightbox) closeLb(); };
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('show')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft' && lbGal.length > 1) lbStep(-1);
    if (e.key === 'ArrowRight' && lbGal.length > 1) lbStep(1);
  });

  // 下载
  function dlUrl(url, name) {
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
  }

  // 月份筛选
  const monthOf = e => (e.date || '').slice(0, 7); // "2026.07"
  function refreshMonths() {
    const sel = document.getElementById('monthFilter');
    const cur = sel.value;
    const months = [...new Set(load().map(monthOf).filter(Boolean))].sort().reverse();
    sel.innerHTML = '<option value="">全部记录</option>' +
      months.map(m => `<option value="${m}">${m.replace('.', ' 年 ')} 月</option>`).join('');
    if (months.includes(cur)) sel.value = cur;
  }

  function visible() {
    const m = document.getElementById('monthFilter').value;
    const data = load();
    return m ? data.filter(e => monthOf(e) === m) : data;
  }

  function render() {
    refreshMonths();
    const data = load();
    const m = document.getElementById('monthFilter').value;
    const shown = data
      .map((e, i) => ({ e, i }))
      .filter(({ e }) => !m || monthOf(e) === m);
    const box = document.getElementById('entries');
    document.getElementById('count').textContent =
      data.length ? `共 ${data.length} 条记录${shown.length !== data.length ? ` · 当前显示 ${shown.length} 条` : ''}` : '';
    if (!shown.length) {
      box.innerHTML = '<div class="empty">尚无记录 · 从今天开始</div>';
      return;
    }
    box.innerHTML = shown.map(({ e, i }) => `
      <div class="entry">
        <div class="entry-head">
          <span>${e.mood ? `<span class="entry-mood">${e.mood}</span>` : ''}<span class="entry-date">${e.date}</span></span>
          <button class="del-btn" data-i="${i}">删除</button>
        </div>
        <div class="entry-text">${(e.text || '').replace(/</g, '&lt;')}</div>
        ${e.media && e.media.length ? `<div class="entry-media" data-i="${i}"></div>` : ''}
      </div>`).join('');
    box.querySelectorAll('.del-btn').forEach(b => b.onclick = () => del(+b.dataset.i));

    // 异步载入媒体
    box.querySelectorAll('.entry-media').forEach(async holder => {
      const entry = data[+holder.dataset.i];
      const gal = []; // 本条记录的图片集
      let n = 0;
      const dstamp = (entry.date || '').replace(/[.: ]/g, '');
      for (const m of entry.media || []) {
        const rec = await mediaGet(m.id);
        if (!rec) continue;
        const blob = typedBlob(rec.blob, m.kind);
        const url = URL.createObjectURL(blob);
        const ext = ((blob.type.split('/')[1] || '').split(';')[0]) || (m.kind === 'video' ? 'mp4' : 'jpg');
        const custom = (m.name || '').trim().replace(/[\\/:*?"<>|]/g, '');
        const orig = (m.orig || '').trim();
        const label = custom || orig; // 显示用：自定义名优先，其次原文件名
        const name = custom ? custom + '.' + ext : (orig || `叶杨_${dstamp}_${++n}.${ext}`);
        const item = document.createElement('div');
        item.className = 'media-item';
        let el;
        if (m.kind === 'video') {
          el = document.createElement('video');
          el.src = url; el.controls = true; el.preload = 'metadata'; el.playsInline = true;
          el.onerror = () => {
            const msg = document.createElement('div');
            msg.style.cssText = 'font-size:12px;color:#b76e79;padding:10px 14px;line-height:1.6';
            msg.textContent = '⚠ 视频无法解码（编码格式浏览器不支持），可点右上角下载后用本地播放器观看';
            el.replaceWith(msg);
          };
        } else {
          el = document.createElement('img');
          el.src = url;
          const gi = gal.length;
          gal.push({ url, name });
          el.onclick = () => openLb(gal, gi);
        }
        const dl = document.createElement('button');
        dl.className = 'media-dl';
        dl.textContent = '⤓';
        dl.title = '下载';
        dl.onclick = ev => { ev.stopPropagation(); dlUrl(url, name); };
        item.append(el, dl);
        if (label) {
          const cap = document.createElement('div');
          cap.className = 'media-name';
          cap.textContent = label;
          cap.title = label;
          item.appendChild(cap);
        }
        holder.appendChild(item);
      }
    });
  }

  document.getElementById('monthFilter').onchange = render;

  // ===== 导出 =====
  function download(filename, content, type) {
    const blob = new Blob(['﻿' + content], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }
  const stamp = () => {
    const d = new Date();
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  };

  document.getElementById('exportWord').onclick = () => {
    const data = visible();
    if (!data.length) { alert('暂无可导出的记录。'); return; }
    const escHtml = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/\n/g, '<br>');
    const body = data.map(e => `
      <div style="margin-bottom:28px;">
        <p style="color:#b76e79;font-size:11pt;margin:0 0 6px;">
          ${escHtml(e.date)}${e.mood ? ' · ' + escHtml(e.mood) : ''}
        </p>
        <p style="font-size:12pt;line-height:1.9;margin:0;">${escHtml(e.text) || '（未写内容）'}</p>
      </div>
      <hr style="border:none;border-top:1px solid #e5ddd3;margin:0 0 28px;">`).join('');
    const doc = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
      <head><meta charset="utf-8"><title>心情手记</title>
      <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
      <style>body{font-family:"宋体",serif;color:#4a3f3c;padding:40px;}</style></head>
      <body>
        <h1 style="text-align:center;font-size:20pt;letter-spacing:8px;font-weight:normal;">亲爱的叶杨</h1>
        <p style="text-align:center;color:#8c7f7a;font-size:10pt;letter-spacing:4px;margin-bottom:40px;">心情手记 · JOURNAL</p>
        ${body}
      </body></html>`;
    download(`心情手记_${stamp()}.doc`, doc, 'application/msword;charset=utf-8');
  };

  document.getElementById('exportCsv').onclick = () => {
    const data = visible();
    if (!data.length) { alert('暂无可导出的记录。'); return; }
    const esc = s => `"${String(s || '').replace(/"/g, '""')}"`;
    const csv = '日期,心情,内容\n' + data.map(e => [esc(e.date), esc(e.mood), esc(e.text)].join(',')).join('\n');
    download(`心情手记_${stamp()}.csv`, csv, 'text/csv;charset=utf-8');
  };

  // ===== 一键备份（含照片视频）=====
  const blobToBase64 = blob => new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(blob);
  });
  const base64ToBlob = async url => (await fetch(url)).blob();

  document.getElementById('backup').onclick = async () => {
    const entries = load();
    if (!entries.length) { alert('暂无可备份的记录。'); return; }
    const btn = document.getElementById('backup');
    btn.textContent = '备份中…'; btn.disabled = true;
    try {
      const media = [];
      for (const e of entries) {
        for (const m of e.media || []) {
          const rec = await mediaGet(m.id);
          if (rec) media.push({ id: rec.id, kind: rec.kind, data: await blobToBase64(rec.blob) });
        }
      }
      const payload = JSON.stringify({ app: 'yeyang', version: 2, entries, media });
      const blob = new Blob([payload], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `叶杨心情备份_${stamp()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    } finally {
      btn.textContent = '一键备份'; btn.disabled = false;
    }
  };

  // ===== 恢复备份 =====
  document.getElementById('restore').onclick = () => document.getElementById('restoreFile').click();
  document.getElementById('restoreFile').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const bak = JSON.parse(reader.result);
        if (bak.app !== 'yeyang' || !Array.isArray(bak.entries)) throw 0;
        for (const m of bak.media || []) {
          await mediaPut({ id: m.id, kind: m.kind, blob: await base64ToBlob(m.data) });
        }
        const cur = load();
        const seen = new Set(cur.map(x => x.date + '|' + (x.text || '')));
        const fresh = bak.entries.filter(x => x && x.date && !seen.has(x.date + '|' + (x.text || '')));
        const merged = [...fresh, ...cur].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        store(merged);
        render();
        alert(`恢复成功：新增 ${fresh.length} 条记录。`);
      } catch {
        alert('文件格式不正确，请选择「一键备份」导出的文件。');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  function del(i) {
    if (!confirm('确定删除这条记录吗？')) return;
    const data = load();
    const [removed] = data.splice(i, 1);
    (removed && removed.media || []).forEach(m => mediaDel(m.id));
    store(data);
    render();
  }

  document.getElementById('save').onclick = async () => {
    const text = document.getElementById('note').value.trim();
    if (!selectedMood && !text && !pending.length) { alert('选一个心情、写几句话，或加张照片。'); return; }
    const d = new Date();
    const date = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    // 保存媒体到 IndexedDB
    const media = [];
    try {
      for (const p of pending) {
        await mediaPut({ id: p.id, kind: p.kind, blob: typedBlob(p.file, p.kind, p.file.name) });
        media.push({ id: p.id, kind: p.kind, name: (p.name || '').trim(), orig: p.file.name });
      }
    } catch (err) {
      alert('照片/视频保存失败：' + (err && err.message || err) + '\n（可能是浏览器限制了本地存储，请尝试换 Chrome 打开）');
      return;
    }
    const data = load();
    data.unshift({ mood: selectedMood, text, date, media });
    store(data);
    document.getElementById('note').value = '';
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    selectedMood = '';
    pending = [];
    renderPreviews();
    render();
  };

  render();
</script>
</body>
</html>
